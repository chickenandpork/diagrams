name: Bazel build

env:
  HOMEBREW_NO_AUTO_UPDATE: 1

on: [push]

jobs:
  build:
    name: Build on node ${{ matrix.node-version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      # action runners have bazelisk: - uses: bazelbuild/setup-bazelisk@v2
      - name: Mount bazel cache  # Optional
        uses: actions/cache@v4
        with:
          path: "~/.cache/bazel"
          key: bazel
      - name: Setup Graphviz
        uses: ts-graphviz/setup-graphviz@v2
      - run: bazel build //...
